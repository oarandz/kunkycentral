<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Kunky Economy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<style>
  :root{
    --ink:#181B23; --ink-soft:#3A3F4B; --muted:#717784; --faint:#9AA0AC;
    --canvas:#EEF1F4; --card:#FFFFFF; --line:#E4E7EC; --line-soft:#EEF0F3;
    --brand:#0E7C66; --brand-ink:#0A5C4C;
    --pos:#1DAA6B; --pos-soft:#E6F6EF;
    --neg:#E5564B; --neg-soft:#FCEBE9;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.06);
    --shadow-lg:0 12px 40px rgba(16,24,40,.16);
    --r:16px; --r-sm:11px; --r-lg:22px;
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--body); color:var(--ink); background:var(--canvas);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    overflow-x:hidden;
  }
  .num{font-family:var(--display); font-feature-settings:"tnum" 1; letter-spacing:-.01em}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input,textarea,select{font-family:inherit; font-size:16px; color:var(--ink)}
  :focus-visible{outline:2px solid var(--brand); outline-offset:2px; border-radius:6px}
  ::selection{background:#0E7C6633}

  /* ---------- App frame ---------- */
  #app{max-width:560px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column}

  .topbar{
    position:sticky; top:0; z-index:30; background:rgba(238,241,244,.85);
    backdrop-filter:saturate(1.4) blur(12px); -webkit-backdrop-filter:saturate(1.4) blur(12px);
    padding:14px 18px 12px; display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--line);
  }
  .wordmark{font-family:var(--display); font-weight:700; font-size:17px; letter-spacing:-.02em; display:flex; align-items:center; gap:8px; white-space:nowrap}
  .wordmark .dot{width:10px; height:10px; border-radius:50%; background:var(--brand); box-shadow:0 0 0 4px #0E7C6622}
  .topbar .spacer{flex:1}
  .me-chip{display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line);
    padding:5px 11px 5px 5px; border-radius:999px; font-weight:600; font-size:13px; box-shadow:var(--shadow)}
  .me-chip:active{transform:scale(.97)}
  .icon-btn{width:38px; height:38px; border-radius:50%; background:var(--card); border:1px solid var(--line); display:grid; place-items:center; color:var(--muted); box-shadow:var(--shadow)}
  .icon-btn svg{width:19px; height:19px}
  .icon-btn:active{transform:scale(.95)}
  .icon-btn.active{color:var(--brand); border-color:var(--brand)}
  .note{display:flex; gap:9px; align-items:flex-start; background:#0E7C6608; border:1px solid #0E7C6622; border-radius:var(--r-sm); padding:11px 13px; font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin-top:14px}
  .note .ni{flex:none; font-size:14px; line-height:1.3}
  .tag-pill{display:inline-flex; align-items:center; gap:5px; background:#8B5CF614; color:#6D28D9; border:1px solid #8B5CF633; padding:2px 9px; border-radius:999px; font-size:11.5px; font-weight:600; vertical-align:middle}
  .tag-pill .x{font-size:11px; opacity:.7}
  .chip-scroll{display:flex; gap:8px; overflow-x:auto; padding:2px 0 10px; margin:0 -18px 4px; padding-left:18px; padding-right:18px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  .chip-scroll::-webkit-scrollbar{display:none}
  .fchip{flex:none; padding:7px 14px; border-radius:999px; border:1px solid var(--line); background:var(--card); font-size:13px; font-weight:600; color:var(--muted); white-space:nowrap; box-shadow:var(--shadow)}
  .fchip.on{background:var(--ink); color:#fff; border-color:var(--ink)}

  main{flex:1; padding:18px 18px 110px}

  /* ---------- Connection banner ---------- */
  .conn{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:14px 16px; margin-bottom:16px; box-shadow:var(--shadow)}
  .conn.ok{border-color:#1DAA6B55; background:var(--pos-soft)}
  .conn-head{display:flex; align-items:center; gap:10px; cursor:pointer}
  .conn-head h3{font-size:14px; font-weight:600}
  .conn-head .status{margin-left:auto; font-size:12px; font-weight:600; color:var(--muted); display:flex; align-items:center; gap:6px}
  .conn-head .status .led{width:8px; height:8px; border-radius:50%; background:var(--neg)}
  .conn.ok .status .led{background:var(--pos)}
  .conn-body{margin-top:12px}
  .conn p{font-size:13px; color:var(--muted); margin-bottom:10px; line-height:1.5}
  .conn .row{display:flex; gap:8px}
  .conn input{flex:1; padding:11px 13px; border:1px solid var(--line); border-radius:var(--r-sm); background:#fff}

  /* ---------- Avatars ---------- */
  .av{display:inline-flex; align-items:center; justify-content:center; border-radius:50%; color:#fff;
    font-weight:600; font-family:var(--body); flex:none; line-height:1}
  .av.sm{width:30px; height:30px; font-size:12px}
  .av.md{width:40px; height:40px; font-size:15px}
  .av.lg{width:58px; height:58px; font-size:21px}

  /* ---------- Buttons ---------- */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:600; font-size:15px;
    padding:13px 18px; border-radius:var(--r-sm); transition:transform .08s ease, background .15s ease, box-shadow .15s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--brand); color:#fff; box-shadow:0 1px 2px rgba(14,124,102,.4), 0 6px 16px rgba(14,124,102,.22)}
  .btn-primary:hover{background:var(--brand-ink)}
  .btn-primary:disabled{background:#C7CDD4; box-shadow:none; cursor:not-allowed; color:#fff}
  .btn-ghost{background:var(--card); border:1px solid var(--line); color:var(--ink); box-shadow:var(--shadow)}
  .btn-ghost:hover{border-color:#cfd4db}
  .btn-block{width:100%}
  .btn-sm{padding:9px 13px; font-size:13px; border-radius:9px}

  /* ---------- Cards / sections ---------- */
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow)}
  .section-eyebrow{font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin:2px 0 12px}
  .page-title{font-family:var(--display); font-weight:700; font-size:26px; letter-spacing:-.025em; margin-bottom:2px}
  .page-sub{font-size:14px; color:var(--muted); margin-bottom:20px}

  /* ---------- Forms ---------- */
  .field{margin-bottom:16px}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:7px}
  .field .hint{font-weight:400; color:var(--faint)}
  .input, textarea.input, select.input{width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:var(--r-sm);
    background:#fff; transition:border .15s, box-shadow .15s}
  .input:focus, textarea.input:focus, select.input:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px #0E7C661f}
  textarea.input{resize:vertical; min-height:70px; line-height:1.5}
  .money-input{position:relative}
  .money-input .sym{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-weight:600; font-family:var(--display)}
  .money-input input{padding-left:30px; font-family:var(--display); font-size:18px; font-weight:600}

  /* segmented control */
  .seg{display:flex; background:var(--canvas); border:1px solid var(--line); border-radius:var(--r-sm); padding:4px; gap:4px}
  .seg button{flex:1; padding:9px; border-radius:8px; font-size:13.5px; font-weight:600; color:var(--muted); transition:.15s}
  .seg button.active{background:#fff; color:var(--ink); box-shadow:var(--shadow)}

  /* person picker chips */
  .people-grid{display:flex; flex-wrap:wrap; gap:8px}
  .pchip{display:inline-flex; align-items:center; gap:8px; padding:6px 13px 6px 6px; border-radius:999px;
    border:1.5px solid var(--line); background:#fff; font-size:14px; font-weight:600; color:var(--ink-soft); transition:.12s}
  .pchip:active{transform:scale(.96)}
  .pchip.on{border-color:var(--brand); background:#0E7C660d; color:var(--ink)}
  .pchip .tick{margin-left:2px; color:var(--brand); opacity:0; transition:.12s; font-size:13px}
  .pchip.on .tick{opacity:1}

  .split-row{display:flex; align-items:center; gap:11px; padding:10px 0; border-bottom:1px solid var(--line-soft)}
  .split-row:last-child{border-bottom:none}
  .split-row .name{flex:1; font-weight:500; font-size:14.5px}
  .split-row .amt{width:104px}
  .split-summary{display:flex; justify-content:space-between; align-items:baseline; padding:12px 14px; border-radius:var(--r-sm);
    background:var(--canvas); font-size:13.5px; margin-top:8px}
  .split-summary.bad{background:var(--neg-soft); color:#A8392F}
  .split-summary.good{background:var(--pos-soft); color:#0F7A4E}
  .split-summary .v{font-family:var(--display); font-weight:700; font-size:16px}

  .upload{display:flex; align-items:center; gap:12px; padding:14px; border:1.5px dashed var(--line); border-radius:var(--r-sm);
    background:#fafbfc; cursor:pointer; transition:.15s}
  .upload:hover{border-color:var(--brand); background:#0E7C6608}
  .upload .ic{width:38px; height:38px; border-radius:10px; background:var(--canvas); display:grid; place-items:center; flex:none}
  .upload .t{font-size:13.5px; font-weight:600}
  .upload .s{font-size:12px; color:var(--faint)}
  .receipt-prev{display:flex; align-items:center; gap:10px; margin-top:10px; font-size:13px; background:var(--canvas); padding:8px 10px; border-radius:10px}
  .receipt-prev img{width:44px; height:44px; object-fit:cover; border-radius:8px}

  /* ---------- Balances ---------- */
  .overall{padding:22px 20px; border-radius:var(--r-lg); color:#fff; margin-bottom:18px; position:relative; overflow:hidden}
  .overall.pos{background:linear-gradient(135deg,#15A06A,#0E7C66)}
  .overall.neg{background:linear-gradient(135deg,#E5564B,#C53A30)}
  .overall.zero{background:linear-gradient(135deg,#3A4250,#272D38)}
  .overall .lbl{font-size:13px; opacity:.85; font-weight:500}
  .overall .big{font-family:var(--display); font-weight:700; font-size:42px; letter-spacing:-.03em; line-height:1.1; margin-top:4px}
  .overall .sub{font-size:13px; opacity:.85; margin-top:6px}
  .overall::after{content:""; position:absolute; right:-40px; top:-40px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.08)}

  .bal-row{display:flex; align-items:center; gap:13px; padding:15px 16px; border-bottom:1px solid var(--line-soft)}
  .bal-row:last-child{border-bottom:none}
  .bal-info{flex:1; min-width:0}
  .bal-info .nm{font-weight:600; font-size:15px}
  .bal-info .meta{font-size:12.5px; color:var(--faint)}
  .flow{height:6px; background:var(--canvas); border-radius:99px; margin-top:8px; position:relative; overflow:hidden}
  .flow .fill{position:absolute; top:0; bottom:0; border-radius:99px}
  .bal-amt{text-align:right; flex:none}
  .bal-amt .v{font-family:var(--display); font-weight:700; font-size:17px}
  .bal-amt .d{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.04em}
  .pos-c{color:var(--pos)} .neg-c{color:var(--neg)} .zero-c{color:var(--faint)}

  /* ---------- Quick ---------- */
  .quick-grid{display:grid; grid-template-columns:1fr 1fr; gap:11px}
  .quick-btn{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px; text-align:left;
    box-shadow:var(--shadow); transition:transform .08s, box-shadow .15s; position:relative}
  .quick-btn:active{transform:scale(.97)}
  .quick-btn:hover{box-shadow:var(--shadow-lg)}
  .quick-btn .emo{font-size:26px; display:block; margin-bottom:8px}
  .quick-btn .ql{font-weight:600; font-size:14.5px}
  .quick-btn .qa{font-family:var(--display); font-weight:700; font-size:18px; margin-top:3px}
  .quick-btn .qs{font-size:11.5px; color:var(--faint); margin-top:2px}
  .quick-btn .del{position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:50%; background:var(--canvas);
    display:grid; place-items:center; color:var(--muted); font-size:13px; opacity:0; transition:.15s}
  .quick-btn:hover .del{opacity:1}
  .quick-add{border:1.5px dashed var(--line); background:transparent; box-shadow:none; display:grid; place-items:center; color:var(--muted); min-height:118px; font-weight:600; font-size:14px}
  .quick-add:hover{border-color:var(--brand); color:var(--brand)}

  /* ---------- Trip ---------- */
  .trip-route{display:flex; gap:12px; align-items:stretch}
  .trip-route .pins{display:flex; flex-direction:column; align-items:center; padding-top:14px}
  .trip-route .pin{width:11px; height:11px; border-radius:50%; border:2.5px solid var(--brand)}
  .trip-route .pin.end{border-color:var(--neg); border-radius:50% 50% 50% 0; transform:rotate(45deg)}
  .trip-route .line{flex:1; width:2px; background:repeating-linear-gradient(var(--line) 0 4px, transparent 4px 8px); margin:4px 0}
  .trip-route .inputs{flex:1}
  #map{height:200px; border-radius:var(--r); margin-top:14px; border:1px solid var(--line); background:var(--canvas); z-index:0}
  .stop-dot{width:12px; height:12px; border-radius:50%; border:2.5px solid var(--brand); flex:none}
  .stop-dot.end{border-color:var(--neg); border-radius:50% 50% 50% 0; transform:rotate(45deg)}
  .stop-dot.mid{border-color:var(--muted)}
  .stop-rm{width:32px; height:32px; border-radius:9px; background:var(--canvas); color:var(--muted); font-size:13px; flex:none; display:grid; place-items:center; border:1px solid var(--line)}
  .stop-rm:active{transform:scale(.95)}
  .trip-result{display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border-radius:var(--r); overflow:hidden; margin-top:14px}
  .trip-result .cell{background:#fff; padding:14px 12px; text-align:center}
  .trip-result .cv{font-family:var(--display); font-weight:700; font-size:21px}
  .trip-result .cl{font-size:11px; color:var(--faint); margin-top:2px; text-transform:uppercase; letter-spacing:.05em}
  .trip-result .cell.cost .cv{color:var(--brand)}

  .veh-row{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line-soft)}
  .veh-row:last-child{border-bottom:none}
  .veh-row .vn{font-weight:600; font-size:14.5px}
  .veh-row .vm{font-size:12.5px; color:var(--faint)}

  /* ---------- Activity ---------- */
  .act-row{display:flex; align-items:center; gap:13px; padding:14px 16px; border-bottom:1px solid var(--line-soft)}
  .act-row:last-child{border-bottom:none}
  .act-ic{width:42px; height:42px; border-radius:12px; background:var(--canvas); display:grid; place-items:center; font-size:19px; flex:none}
  .act-main{flex:1; min-width:0}
  .act-main .at{font-weight:600; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .act-main .am{font-size:12.5px; color:var(--faint)}
  .act-right{text-align:right; flex:none}
  .act-right .tot{font-family:var(--display); font-weight:700; font-size:15px}
  .act-right .yr{font-size:11.5px; color:var(--muted)}

  /* ---------- Tab bar ---------- */
  .tabbar{position:fixed; bottom:0; left:0; right:0; z-index:40; display:flex; justify-content:center; pointer-events:none}
  .tabbar .inner{pointer-events:auto; display:flex; gap:2px; background:rgba(24,27,35,.92); backdrop-filter:blur(12px);
    margin-bottom:max(14px,env(safe-area-inset-bottom)); padding:6px; border-radius:999px; box-shadow:var(--shadow-lg)}
  .tab{display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 14px; border-radius:999px; color:#9AA0AC; transition:.15s; min-width:58px}
  .tab svg{width:21px; height:21px}
  .tab span{font-size:10px; font-weight:600}
  .tab.active{background:#fff; color:var(--ink)}

  /* ---------- Login ---------- */
  .login{min-height:100dvh; display:flex; flex-direction:column; justify-content:center; padding:32px 24px; max-width:480px; margin:0 auto}
  .login .hero{text-align:center; margin-bottom:36px}
  .login .hero .mk{font-family:var(--display); font-weight:700; font-size:33px; line-height:1.1; letter-spacing:-.03em; display:inline-flex; align-items:center; gap:11px; justify-content:center}
  .login .hero .mk .dot{width:14px;height:14px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 6px #0E7C661f}
  .login .hero p{color:var(--muted); margin-top:10px; font-size:15px}
  .login .who{font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); text-align:center; margin-bottom:18px}
  .who-grid{display:grid; grid-template-columns:1fr 1fr; gap:11px}
  .who-card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:18px 16px; display:flex; align-items:center; gap:13px;
    box-shadow:var(--shadow); transition:transform .08s, box-shadow .15s; text-align:left}
  .who-card:hover{box-shadow:var(--shadow-lg)}
  .who-card:active{transform:scale(.97)}
  .who-card .nm{font-weight:600; font-size:16px}
  .who-add{grid-column:1/-1; border:1.5px dashed var(--line); background:transparent; box-shadow:none; justify-content:center; color:var(--muted); font-weight:600; padding:15px}
  .who-add:hover{border-color:var(--brand); color:var(--brand)}

  /* ---------- Modal / sheet ---------- */
  .overlay{position:fixed; inset:0; background:rgba(17,20,28,.5); z-index:50; display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .2s}
  .overlay.show{opacity:1; pointer-events:auto}
  .sheet{background:var(--card); width:100%; max-width:560px; border-radius:var(--r-lg) var(--r-lg) 0 0; padding:8px 20px 24px;
    max-height:90dvh; overflow-y:auto; transform:translateY(100%); transition:transform .26s cubic-bezier(.32,.72,0,1)}
  .overlay.show .sheet{transform:translateY(0)}
  .sheet .grip{width:38px; height:4px; background:var(--line); border-radius:99px; margin:8px auto 14px}
  .sheet h2{font-family:var(--display); font-weight:700; font-size:21px; letter-spacing:-.02em; margin-bottom:4px}
  .sheet .desc{font-size:13.5px; color:var(--muted); margin-bottom:18px}

  /* ---------- Toast ---------- */
  #toasts{position:fixed; top:14px; left:0; right:0; z-index:60; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none}
  .toast{background:var(--ink); color:#fff; padding:11px 18px; border-radius:999px; font-size:13.5px; font-weight:500;
    box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:9px; transform:translateY(-16px); opacity:0; transition:.25s}
  .toast.show{transform:translateY(0); opacity:1}
  .toast.err{background:var(--neg)}
  .toast.ok .ic{color:#5BE3A5}

  .empty{text-align:center; padding:48px 20px; color:var(--faint)}
  .empty .e-ic{font-size:34px; margin-bottom:10px}
  .empty .e-t{font-weight:600; color:var(--muted); font-size:15px}
  .empty .e-s{font-size:13.5px; margin-top:4px}

  .spin{width:18px; height:18px; border:2.5px solid #ffffff55; border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .skeleton{background:linear-gradient(90deg,#e9ecf0 25%,#f2f4f7 50%,#e9ecf0 75%); background-size:200% 100%; animation:sk 1.3s infinite; border-radius:8px}
  @keyframes sk{to{background-position:-200% 0}}

  @media (max-width:380px){ .quick-grid,.who-grid{grid-template-columns:1fr} }
  @media (prefers-reduced-motion:reduce){ *{animation-duration:.001ms!important; transition-duration:.001ms!important} }
</style>
</head>
<body>

<div id="login" class="login"></div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="wordmark"><span class="dot"></span>The Kunky Economy</div>
    <div class="spacer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
/* ============================================================== *
 *  PASTE YOUR WEB APP URL HERE (ends in /exec) — or use the
 *  connection box at the top of the app. Leaving it blank just
 *  means the app runs in preview mode until you connect.
 * ============================================================== */
let SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyiDoq6R8czEa6iymh_t0zrupUwvQGrLaX5IS2ScTFhAuaUQdl5yCTjgFOUq4QgiSMH/exec";

// Must match SHARED_SECRET in Code.gs exactly.
const SHARED_SECRET = "split-7f3a9c2e8b1d4056";

/* ---------------- State ---------------- */
const PALETTE = ['#E5564B','#1DAA6B','#3B82F6','#F59E0B','#8B5CF6','#EC4899','#0EA5E9','#14B8A6','#F97316','#6366F1'];
const SEED_PEOPLE = ['Owen','Alex','Conor','Ben','Alice','Lucy'];
const SEED_PLACES = [
  {label:'Owen\u2019s Home', address:'Little Lane, WN3 6PX'},
  {label:'Alice\u2019s Home', address:'Foundry Lane, Wigan'},
  {label:'Conor\u2019s Home', address:'Pepper Lane Chippy, Standish'},
  {label:'Lucy\u2019s Home', address:'Glebe Road, Standish'},
  {label:'Kunky House', address:'Dangerous Corner, Leigh'}
];
const state = {
  people: SEED_PEOPLE.map((n,i)=>({name:n,color:PALETTE[i%PALETTE.length]})),
  vehicles: [], quick: [], quickTrips: [], places: SEED_PLACES.slice(), expenses: [], settings: { fuelPence: 156 },
  me: null, tab: 'balances', tagFilter: null, connected: false, loading: false
};
const fuelPence = () => (state.settings && state.settings.fuelPence) || 156;
const fuelGBP = () => '£'+ (fuelPence()/100).toFixed(2);
const placeResolve = txt => { const p = state.places.find(x=>x.label.toLowerCase()===String(txt||'').trim().toLowerCase()); return p ? p.address : txt; };
const allTags = () => [...new Set(state.expenses.map(x=>x.tag).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
const placeDatalist = id => `<datalist id="${id}">${state.places.map(p=>`<option value="${esc(p.label)}"></option>`).join('')}</datalist>`;
const tagDatalist = id => `<datalist id="${id}">${allTags().map(t=>`<option value="${esc(t)}"></option>`).join('')}</datalist>`;

/* ---------------- Helpers ---------------- */
const $ = s => document.querySelector(s);
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls) e.className=cls; if(html!=null) e.innerHTML=html; return e; };
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => '£'+(Math.round(Number(n)*100)/100).toFixed(2);
const initials = n => n.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const personColor = n => (state.people.find(p=>p.name===n)||{}).color || '#717784';
const avatar = (name, size='sm') => `<span class="av ${size}" style="background:${personColor(name)}">${esc(initials(name))}</span>`;
const todayISO = () => { const d=new Date(), z=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`; };
const tsFromISO = iso => { if(!iso) return Date.now(); const [y,m,d]=iso.split('-').map(Number); return new Date(y,(m||1)-1,d||1,12,0,0).getTime(); };
const fmtDate = ts => new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
// true when an expense/transfer creates a debt between a and b
const involvesPair = (x,a,b) => { const sp=x.split||{}; return (x.paidBy===a && sp[b]!=null) || (x.paidBy===b && sp[a]!=null); };

/* ---------------- Backend ---------------- */
async function api(action, payload){
  if(!SCRIPT_URL) throw new Error('Not connected. Add your Web app URL up top.');
  const res = await fetch(SCRIPT_URL, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action, payload: payload||{}, secret: SHARED_SECRET})
  });
  const out = await res.json();
  if(!out.ok) throw new Error(out.error||'Something went wrong');
  return out.data;
}
function applyData(d){
  if(!d) return;
  state.people = d.people && d.people.length ? d.people : state.people;
  state.vehicles = d.vehicles || [];
  state.quick = d.quick || [];
  state.quickTrips = d.quickTrips || [];
  if(d.places) state.places = d.places;
  if(d.settings) state.settings = d.settings;
  state.expenses = (d.expenses||[]).sort((a,b)=>b.ts-a.ts);
  if(state.me && !state.people.some(p=>p.name===state.me)) state.me = null;
}
async function refresh(){
  if(!SCRIPT_URL) return;
  try{ state.loading=true; const d = await api('getData'); state.connected=true; applyData(d); }
  catch(e){ state.connected=false; toast(e.message,'err'); }
  finally{ state.loading=false; renderAll(); }
}

/* ---------------- Toast ---------------- */
function toast(msg, kind='ok'){
  const t = el('div','toast '+kind);
  const ic = kind==='err' ? '✕' : '✓';
  t.innerHTML = `<span class="ic">${ic}</span>${esc(msg)}`;
  $('#toasts').appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2800);
}

/* ---------------- Sheet / modal ---------------- */
function openSheet(builder){
  const sheet = $('#sheet'); sheet.innerHTML='<div class="grip"></div>';
  builder(sheet);
  $('#overlay').classList.add('show');
}
function closeSheet(){ $('#overlay').classList.remove('show'); }
$('#overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeSheet(); });

/* ---------------- Balance maths ---------------- */
function computeBalances(){
  // debt[a][b] = how much a owes b
  const debt = {};
  state.people.forEach(p=>{ debt[p.name]={}; });
  state.expenses.forEach(x=>{
    const payer = x.paidBy;
    Object.keys(x.split||{}).forEach(person=>{
      if(person===payer) return;
      if(!debt[person]) debt[person]={};
      debt[person][payer] = (debt[person][payer]||0) + (Number(x.split[person])||0);
    });
  });
  // net for me vs each other person
  const me = state.me;
  const rows = [];
  state.people.filter(p=>p.name!==me).forEach(p=>{
    const o = p.name;
    const theyOweMe = (debt[o] && debt[o][me]) || 0;
    const iOweThem  = (debt[me] && debt[me][o]) || 0;
    const net = theyOweMe - iOweThem; // >0 they owe me
    rows.push({name:o, net});
  });
  const overall = rows.reduce((s,r)=>s+r.net,0);
  return {rows, overall};
}

    const note = el('p',null,'Running in preview mode — add your Web app URL after signing in to sync with your sheet.');

function addPersonSheet(){
  openSheet(s=>{
    s.appendChild(el('h2',null,'Add a person'));
    s.appendChild(el('p','desc','They’ll be able to log in and be included in splits.'));
    const f = el('div','field');

    s.appendChild(f);

      const name = $('#newPersonName').value.trim();
      if(!name) return toast('Enter a name','err');
      if(SCRIPT_URL){
        try{ btn.innerHTML='<span class="spin"></span>'; applyData(await api('addPerson',{name})); toast(name+' added'); }
        catch(e){ return toast(e.message,'err'); } finally{ btn.innerHTML='Add person'; }
      } else {
        if(state.people.some(p=>p.name.toLowerCase()===name.toLowerCase())) return toast('Already added','err');
        state.people.push({name,color:PALETTE[state.people.length%PALETTE.length]});
      }
      closeSheet(); renderAll();
    };
    s.appendChild(btn);
    setTimeout(()=>$('#newPersonName').focus(),100);

/* ============================================================== *
 *  APP SHELL

function showApp(){
  $('#login').style.display='none';
  $('#app').style.display='flex';

}
const TABS = [

function renderAll(){

/* ============================================================== *
 *  BALANCES
 * ============================================================== */
function viewBalances(){
  const wrap = el('div');
  const {rows, overall} = computeBalances();

  const kind = Math.abs(overall)<0.01 ? 'zero' : (overall>0?'pos':'neg');
  const card = el('div','overall '+kind);
  let lbl, big, sub;
  if(kind==='zero'){ lbl='All square'; big=money(0); sub='Nobody owes anybody anything right now.'; }
  else if(kind==='pos'){ lbl='You are owed, overall'; big=money(overall); sub='Across everyone in the group.'; }
  else { lbl='You owe, overall'; big=money(Math.abs(overall)); sub='Across everyone in the group.'; }
  card.innerHTML = `<div class="lbl">${lbl}</div><div class="big num">${big}</div><div class="sub">${sub}</div>`;
  wrap.appendChild(card);

  if(state.people.length>1){
    const pay = el('button','btn btn-ghost btn-block','💸  Record a payment');
    pay.style.marginBottom='18px';
    pay.onclick = ()=>transferSheet({});
    wrap.appendChild(pay);
  }
  wrap.appendChild(el('div','section-eyebrow','Person by person'));
  const list = el('div','card');
  const sorted = rows.slice().sort((a,b)=>Math.abs(b.net)-Math.abs(a.net));
  if(!sorted.length){
    list.appendChild(emptyState('🫶','Just you so far','Add more people to start splitting.'));
  } else {
    const max = Math.max(1, ...sorted.map(r=>Math.abs(r.net)));
    sorted.forEach(r=>{
      const row = el('div','bal-row');
      const settled = Math.abs(r.net)<0.01;
      const dir = settled?'zero':(r.net>0?'pos':'neg');
      const pct = Math.min(100, (Math.abs(r.net)/max)*100);
      const fill = dir==='zero' ? '' :
        (dir==='pos'
          ? `<div class="fill" style="left:50%;width:${pct/2}%;background:var(--pos)"></div>`
          : `<div class="fill" style="right:50%;width:${pct/2}%;background:var(--neg)"></div>`);
      row.innerHTML = `
        ${avatar(r.name,'md')}
        <div class="bal-info">
          <div class="nm">${esc(r.name)}</div>
          <div class="meta">${settled?'Settled up':(r.net>0?'owes you':'you owe')}</div>
          <div class="flow"><div class="fill" style="left:50%;width:1px;background:var(--line)"></div>${fill}</div>
        </div>
        <div class="bal-amt">
          <div class="v ${dir==='pos'?'pos-c':dir==='neg'?'neg-c':'zero-c'} num">${settled?'—':money(Math.abs(r.net))}</div>
          <div class="d ${dir==='pos'?'pos-c':dir==='neg'?'neg-c':'zero-c'}">${settled?'':(r.net>0?'owed':'you owe')}</div>
        </div>`;
      row.onclick = ()=>personDetailSheet(r.name);
      list.appendChild(row);
    });
  }
  wrap.appendChild(list);
  return wrap;
}

function personDetailSheet(other){
  const linked = state.expenses.filter(x=>involvesPair(x,state.me,other));
  const net = computeBalances().rows.find(r=>r.name===other);
  const netVal = net ? net.net : 0;
  openSheet(s=>{
    s.appendChild(el('h2',null,`You & ${esc(other)}`));
    const settled = Math.abs(netVal)<0.01;
    s.appendChild(el('p','desc', settled ? 'You’re all settled up.' :
      (netVal>0 ? `${esc(other)} owes you ${money(netVal)}.` : `You owe ${esc(other)} ${money(-netVal)}.`)));

    // Settle-up shortcut, prefilled
    const pay = el('button','btn btn-primary btn-block', settled ? '💸  Record a payment' :
      (netVal<0 ? `💸  Pay ${esc(other)} ${money(-netVal)}` : `💸  Record ${esc(other)} paying you`));
    pay.style.marginBottom='16px';
    pay.onclick = ()=>{ closeSheet(); transferSheet({other, dir: netVal<0?'out':'in', amount: settled?'':Math.abs(netVal).toFixed(2)}); };
    s.appendChild(pay);

    if(!linked.length){ s.appendChild(emptyState('🧾','Nothing between you yet','No expenses or payments link you two so far.')); return; }
    s.appendChild(el('div','section-eyebrow','History'));
    const list = el('div','card'); list.style.marginBottom='8px';
    linked.forEach(x=>{
      const youPaid = x.paidBy===state.me;
      const amt = youPaid ? (x.split[other]||0) : (x.split[state.me]||0);
      const isT = x.type==='transfer';
      const label = isT ? (youPaid?'You paid '+esc(other):esc(other)+' paid you')
                        : (youPaid?'You paid · they owe':'They paid · you owe');
      const row = el('div','act-row');
      row.innerHTML = `<div class="act-ic">${typeIcon(x)}</div>
        <div class="act-main"><div class="at">${esc(x.name)}</div>
        <div class="am">${label} · ${fmtDate(x.ts)}</div></div>
        <div class="act-right"><div class="tot num ${youPaid?'pos-c':'neg-c'}">${youPaid?'+':'−'}${money(amt)}</div></div>`;
      list.appendChild(row);
    });
    s.appendChild(list);
  });
}

/* ---- Record a payment / transfer ---- */
function transferSheet(opts){
  opts = opts || {};
  const fs = { dir: opts.dir || 'out', other: opts.other || null, date: todayISO() };
  openSheet(s=>{
    s.appendChild(el('h2',null,'Record a payment'));
    s.appendChild(el('p','desc','Money sent directly to settle up — it counts against what’s owed.'));

    const dirF = el('div','field');
    dirF.innerHTML = `<label>Direction</label>
      <div class="seg" id="trDir">
        <button data-d="out" class="${fs.dir==='out'?'active':''}">You paid</button>
        <button data-d="in" class="${fs.dir==='in'?'active':''}">You were paid</button>
      </div>`;
    s.appendChild(dirF);

    const whoF = el('div','field'); whoF.innerHTML = `<label id="whoLbl"></label><div class="people-grid" id="trWho"></div>`;
    s.appendChild(whoF);

    const amtF = el('div','field');
    amtF.innerHTML = `<label>Amount</label><div class="money-input"><span class="sym">£</span>
      <input class="input" id="trAmt" type="number" inputmode="decimal" step="0.01" placeholder="0.00" value="${esc(opts.amount||'')}"></div>`;
    s.appendChild(amtF);

    const dateF = el('div','field');
    dateF.innerHTML = `<label>Date</label><input class="input" id="trDate" type="date" value="${fs.date}" max="${todayISO()}">`;
    s.appendChild(dateF);

    const noteF = el('div','field');
    noteF.innerHTML = `<label>Note <span class="hint">optional</span></label><input class="input" id="trNote" placeholder="e.g. bank transfer">`;
    s.appendChild(noteF);

    const btn = el('button','btn btn-primary btn-block','Record payment');
    s.appendChild(btn);

    function drawWho(){
      whoF.querySelector('#whoLbl').textContent = fs.dir==='out' ? 'Paid to' : 'Received from';
      const g = whoF.querySelector('#trWho'); g.innerHTML='';
      state.people.filter(p=>p.name!==state.me).forEach(p=>{
        const b = el('button','pchip'+(fs.other===p.name?' on':''));
        b.innerHTML = `${avatar(p.name,'sm')}${esc(p.name)}<span class="tick">✓</span>`;
        b.onclick = ()=>{ fs.other=p.name; drawWho(); };
        g.appendChild(b);
      });
    }
    drawWho();
    dirF.querySelector('#trDir').addEventListener('click', e=>{
      const b=e.target.closest('button'); if(!b) return; fs.dir=b.dataset.d;
      [...dirF.querySelectorAll('#trDir button')].forEach(x=>x.classList.toggle('active',x===b));
      drawWho();
    });

    btn.onclick = async ()=>{
      const amount = Number(s.querySelector('#trAmt').value)||0;
      if(!fs.other) return toast('Choose a person','err');
      if(!(amount>0)) return toast('Enter an amount','err');
      const from = fs.dir==='out' ? state.me : fs.other;
      const to   = fs.dir==='out' ? fs.other : state.me;
      const note = s.querySelector('#trNote').value.trim();
      const payload = {
        name:`Payment: ${from} → ${to}`, description:note, paidBy:from, total:amount,
        split:{ [to]:amount }, type:'transfer', ts: tsFromISO(s.querySelector('#trDate').value)
      };
      btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
      try{
        if(SCRIPT_URL){ applyData(await api('addExpense',payload)); }
        else { state.expenses.unshift({id:'local_'+Date.now(),receiptUrl:'',...payload}); state.expenses.sort((a,b)=>b.ts-a.ts); }
        closeSheet(); toast('Payment recorded'); state.tab='balances'; renderAll();
      }catch(e){ toast(e.message,'err'); btn.disabled=false; btn.innerHTML='Record payment'; }
    };
  });
}


const draft = { receipt:null };
function viewAdd(prefill){
  draft.receipt = null;
  const wrap = el('div');
  wrap.appendChild(el('div','page-title','Add an expense'));
  wrap.appendChild(el('div','page-sub','Log what was spent and split it however you like.'));

  const form = el('div');
  form.innerHTML = `
    <div class="field"><label>Name</label>
      <input class="input" id="exName" placeholder="e.g. Tesco shop" autocomplete="off" value="${esc(prefill&&prefill.name||'')}"></div>
    <div class="field"><label>Amount</label>
      <div class="money-input"><span class="sym">£</span>
      <input class="input" id="exTotal" type="number" inputmode="decimal" step="0.01" placeholder="0.00" value="${prefill&&prefill.total||''}"></div></div>
    <div class="field"><label>Date</label>
      <input class="input" id="exDate" type="date" value="${(prefill&&prefill.date)||todayISO()}" max="${todayISO()}"></div>
    <div class="field"><label>Description <span class="hint">optional</span></label>
      <textarea class="input" id="exDesc" placeholder="Anything worth noting">${esc(prefill&&prefill.description||'')}</textarea></div>
    <div class="field"><label>Tag <span class="hint">optional — group trips, holidays, nights out…</span></label>
      <input class="input" id="exTag" list="exTagList" placeholder="e.g. Lake District weekend" autocomplete="off" value="${esc(prefill&&prefill.tag||'')}">
      ${tagDatalist('exTagList')}</div>
    <div class="field"><label>Paid by</label>
      <div class="people-grid" id="paidByGrid"></div></div>
    <div class="field"><label>Split between</label>
      <div class="people-grid" id="splitGrid"></div></div>
    <div class="field"><label>How to split</label>
      <div class="seg" id="splitMode">
        <button data-m="equal" class="active">Split equally</button>
        <button data-m="exact">Exact amounts</button>
      </div>
      <div id="splitDetail" style="margin-top:12px"></div></div>
    <div class="field"><label>Receipt <span class="hint">optional</span></label>
      <label class="upload" for="exFile">
        <div class="ic">📎</div>
        <div><div class="t">Attach a receipt</div><div class="s">Photo or PDF — images are compressed automatically</div></div>
      </label>
      <input type="file" id="exFile" accept="image/*,application/pdf" style="display:none">
      <div id="receiptPrev"></div></div>
    <button class="btn btn-primary btn-block" id="saveExpense">Save expense</button>
  `;
  wrap.appendChild(form);

  // local form state
  const fs = {
    paidBy: prefill&&prefill.paidBy || state.me,
    selected: new Set(prefill&&prefill.split ? Object.keys(prefill.split) : state.people.map(p=>p.name)),
    mode:'equal',
    exact:{}
  };

  function drawPaidBy(){
    const g = form.querySelector('#paidByGrid'); g.innerHTML='';
    state.people.forEach(p=>{
      const b = el('button','pchip'+(fs.paidBy===p.name?' on':''));
      b.innerHTML = `${avatar(p.name,'sm')}${esc(p.name)}<span class="tick">✓</span>`;
      b.onclick = ()=>{ fs.paidBy=p.name; drawPaidBy(); drawDetail(); };
      g.appendChild(b);
    });
  }
  function drawSplit(){
    const g = form.querySelector('#splitGrid'); g.innerHTML='';
    const all = el('button','pchip'+(fs.selected.size===state.people.length?' on':''));
    all.innerHTML = `Everyone<span class="tick">✓</span>`;
    all.onclick = ()=>{
      if(fs.selected.size===state.people.length) fs.selected.clear();
      else state.people.forEach(p=>fs.selected.add(p.name));
      drawSplit(); drawDetail();
    };
    g.appendChild(all);
    state.people.forEach(p=>{
      const b = el('button','pchip'+(fs.selected.has(p.name)?' on':''));
      b.innerHTML = `${avatar(p.name,'sm')}${esc(p.name)}<span class="tick">✓</span>`;
      b.onclick = ()=>{ fs.selected.has(p.name)?fs.selected.delete(p.name):fs.selected.add(p.name); drawSplit(); drawDetail(); };
      g.appendChild(b);
    });
  }
  function currentSplit(){
    const names = [...fs.selected];
    const total = Number(form.querySelector('#exTotal').value)||0;
    if(fs.mode==='equal'){
      const cents = Math.round(total*100), n=names.length||1;
      const base = Math.floor(cents/n); let rem = cents-base*n;
      const out={}; names.forEach((nm,i)=>{ out[nm]=(base+(i<rem?1:0))/100; });
      return {split:out, total, sum:total, ok:names.length>0&&total>0};
    } else {
      const out={}; let sum=0;
      names.forEach(nm=>{ const v=Number(fs.exact[nm])||0; out[nm]=v; sum+=v; });
      return {split:out, total, sum, ok:names.length>0&&total>0&&Math.abs(sum-total)<0.011};
    }
  }
  function drawDetail(){
    const d = form.querySelector('#splitDetail'); d.innerHTML='';
    const names = [...fs.selected];
    if(!names.length){ d.innerHTML='<div class="split-summary bad">Pick at least one person to split between.</div>'; updateSave(); return; }
    const {split,total,sum} = currentSplit();
    if(fs.mode==='equal'){
      const box = el('div','card'); box.style.padding='4px 14px';
      names.forEach(nm=>{
        const r = el('div','split-row');
        r.innerHTML = `${avatar(nm,'sm')}<span class="name">${esc(nm)}</span><span class="num" style="font-weight:600">${money(split[nm])}</span>`;
        box.appendChild(r);
      });
      d.appendChild(box);
      const s = el('div','split-summary good');
      s.innerHTML = `<span>${names.length} ${names.length===1?'person':'people'} · equal shares</span><span class="v num">${money(total)}</span>`;
      d.appendChild(s);
    } else {
      const box = el('div','card'); box.style.padding='4px 14px';
      names.forEach(nm=>{
        const r = el('div','split-row');
        r.innerHTML = `${avatar(nm,'sm')}<span class="name">${esc(nm)}</span>
          <div class="money-input amt"><span class="sym" style="font-size:13px">£</span>
          <input class="input" data-nm="${esc(nm)}" type="number" inputmode="decimal" step="0.01" placeholder="0.00" value="${fs.exact[nm]!=null?fs.exact[nm]:''}" style="padding-left:24px;font-size:15px"></div>`;
        box.appendChild(r);
      });
      d.appendChild(box);
      box.querySelectorAll('input[data-nm]').forEach(inp=>{
        inp.oninput = ()=>{ fs.exact[inp.dataset.nm]=inp.value; const {sum,total}=currentSplit(); updateSummary(sum,total); updateSave(); };
      });
      const diff = total-sum;
      const s = el('div','split-summary '+(Math.abs(diff)<0.011?'good':'bad'));
      s.id='exactSummary';
      s.innerHTML = summaryHTML(sum,total);
      d.appendChild(s);
    }
    updateSave();
  }
  function summaryHTML(sum,total){
    const diff = Math.round((total-sum)*100)/100;
    if(Math.abs(diff)<0.011) return `<span>Adds up perfectly</span><span class="v num">${money(total)}</span>`;
    if(diff>0) return `<span>${money(diff)} left to assign</span><span class="v num">${money(sum)} / ${money(total)}</span>`;
    return `<span>${money(-diff)} over the total</span><span class="v num">${money(sum)} / ${money(total)}</span>`;
  }
  function updateSummary(sum,total){
    const s = form.querySelector('#exactSummary'); if(!s) return;
    const ok = Math.abs(total-sum)<0.011;
    s.className = 'split-summary '+(ok?'good':'bad');
    s.innerHTML = summaryHTML(sum,total);
  }
  function updateSave(){
    const {ok} = currentSplit();
    form.querySelector('#saveExpense').disabled = !ok || !form.querySelector('#exName').value.trim();
  }

  form.querySelector('#splitMode').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    fs.mode = btn.dataset.m;
    [...form.querySelectorAll('#splitMode button')].forEach(b=>b.classList.toggle('active', b===btn));
    drawDetail();
  });
  form.querySelector('#exTotal').addEventListener('input', ()=>{ drawDetail(); });
  form.querySelector('#exName').addEventListener('input', updateSave);

  // receipt
  form.querySelector('#exFile').addEventListener('change', async (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const prev = form.querySelector('#receiptPrev'); prev.innerHTML='<div class="receipt-prev">Processing…</div>';
    try{
      const r = await processFile(file);
      draft.receipt = r;
      prev.innerHTML = `<div class="receipt-prev">
        ${r.preview?`<img src="${r.preview}">`:'<div class="act-ic">📄</div>'}
        <div style="flex:1"><div style="font-weight:600">${esc(r.name)}</div><div style="color:var(--faint);font-size:12px">${(r.size/1024).toFixed(0)} KB</div></div>
        <button class="btn btn-ghost btn-sm" id="rmReceipt">Remove</button></div>`;
      prev.querySelector('#rmReceipt').onclick = ()=>{ draft.receipt=null; prev.innerHTML=''; form.querySelector('#exFile').value=''; };
    }catch(err){ prev.innerHTML=''; toast('Could not read that file','err'); }
  });

  form.querySelector('#saveExpense').onclick = async ()=>{
    const name = form.querySelector('#exName').value.trim();
    const total = Number(form.querySelector('#exTotal').value)||0;
    const desc = form.querySelector('#exDesc').value.trim();
    const ts = tsFromISO(form.querySelector('#exDate').value);
    const tag = form.querySelector('#exTag').value.trim();
    const {split, ok} = currentSplit();
    if(!ok || !name) return;
    const payload = { name, total, description:desc, paidBy:fs.paidBy, split, type:(prefill&&prefill.type)||'expense', ts, tag };
    if(draft.receipt) payload.receipt = { data:draft.receipt.data, name:draft.receipt.name, mimeType:draft.receipt.mimeType };
    const btn = form.querySelector('#saveExpense'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
    try{
      if(SCRIPT_URL){ applyData(await api('addExpense', payload)); }
      else { state.expenses.unshift({id:'local_'+Date.now(),receiptUrl:'',...payload}); state.expenses.sort((a,b)=>b.ts-a.ts); }
      toast('Expense saved'); state.tab='balances'; renderAll();
    }catch(e){ toast(e.message,'err'); btn.disabled=false; btn.innerHTML='Save expense'; }
  };

  setTimeout(()=>{ drawPaidBy(); drawSplit(); drawDetail(); },0);
  return wrap;
}

/* ============================================================== *
 *  QUICK EXPENSES
 * ============================================================== */
function viewQuick(){
  const wrap = el('div');
  wrap.appendChild(el('div','page-title','Quick add'));
  wrap.appendChild(el('div','page-sub','One tap to log the things that happen again and again.'));

  wrap.appendChild(el('div','section-eyebrow','Quick expenses'));
  const grid = el('div','quick-grid');
  state.quick.forEach(q=>{
    const b = el('button','quick-btn');
    const splitTxt = q.split==='all'||!Array.isArray(q.split) ? 'Split with everyone' : `Split with ${q.split.length}`;
    b.innerHTML = `<button class="del" title="Delete">✕</button>
      <span class="emo">${esc(q.emoji||'⚡')}</span>
      <div class="ql">${esc(q.label)}</div>
      <div class="qa num">${money(q.amount)}</div>
      <div class="qs">${splitTxt}</div>`;
    b.onclick = ()=>logQuick(q);
    b.querySelector('.del').onclick = (e)=>{ e.stopPropagation(); deleteQuick(q); };
    grid.appendChild(b);
  });
  const add = el('button','quick-btn quick-add','+ New quick expense');
  add.onclick = ()=>quickEditorSheet();
  grid.appendChild(add);
  wrap.appendChild(grid);

  const eb = el('div','section-eyebrow','Quick trips'); eb.style.marginTop='24px';
  wrap.appendChild(eb);
  const tgrid = el('div','quick-grid');
  state.quickTrips.forEach(q=>{
    const b = el('button','quick-btn');
    const splitTxt = q.split==='all'||!Array.isArray(q.split) ? 'Split with everyone' : `Split with ${q.split.length}`;
    b.innerHTML = `<button class="del" title="Delete">✕</button>
      <span class="emo">${esc(q.emoji||'🚗')}</span>
      <div class="ql">${esc(q.label)}</div>
      <div class="qs" style="margin-top:4px">${esc(q.origin)} → ${esc(q.destination)}</div>
      <div class="qs">${q.mpg} mpg${q.roundTrip?' · return':''} · ${splitTxt}</div>`;
    b.onclick = ()=>logQuickTrip(q);
    b.querySelector('.del').onclick = (e)=>{ e.stopPropagation(); deleteQuickTrip(q); };
    tgrid.appendChild(b);
  });
  const addT = el('button','quick-btn quick-add','+ New quick trip');
  addT.onclick = ()=>quickTripEditorSheet();
  tgrid.appendChild(addT);
  wrap.appendChild(tgrid);

  return wrap;
}
async function deleteQuickTrip(q){
  if(SCRIPT_URL){ try{ applyData(await api('deleteQuickTrip',{label:q.label})); toast('Removed'); }catch(e){ toast(e.message,'err'); } }
  else { state.quickTrips = state.quickTrips.filter(x=>x!==q); }
  renderAll();
}
async function logQuickTrip(q){
  if(!SCRIPT_URL) return toast('Connect your sheet to calculate trips.','err');
  toast('Mapping route…');
  let r;
  try{ r = await api('calcTrip',{origin:placeResolve(q.origin), destination:placeResolve(q.destination), mpg:q.mpg, roundTrip:q.roundTrip}); }
  catch(e){ return toast(e.message,'err'); }
  const names = (q.split==='all'||!Array.isArray(q.split)) ? state.people.map(p=>p.name) : q.split.filter(n=>state.people.some(p=>p.name===n));
  const fs = { paidBy: state.me, tag:'' };
  openSheet(s=>{
    s.appendChild(el('h2',null,`${q.emoji||'🚗'} ${esc(q.label)}`));
    s.appendChild(el('p','desc',`${esc(q.origin)} → ${esc(q.destination)}`));
    const res = el('div','trip-result'); res.style.marginTop='0';
    res.innerHTML = `<div class="cell"><div class="cv num">${r.miles}</div><div class="cl">miles${r.roundTrip?' (return)':''}</div></div>
      <div class="cell"><div class="cv num">${r.litres}</div><div class="cl">litres</div></div>
      <div class="cell cost"><div class="cv num">${money(r.cost)}</div><div class="cl">fuel cost</div></div>`;
    s.appendChild(res);
    const f = el('div','field'); f.style.marginTop='16px'; f.innerHTML='<label>Paid by</label><div class="people-grid" id="qtPaid"></div>';
    s.appendChild(f);
    const draw=()=>{ const g=f.querySelector('#qtPaid'); g.innerHTML='';
      state.people.forEach(p=>{ const b=el('button','pchip'+(fs.paidBy===p.name?' on':''));
        b.innerHTML=`${avatar(p.name,'sm')}${esc(p.name)}<span class="tick">✓</span>`;
        b.onclick=()=>{fs.paidBy=p.name; draw();}; g.appendChild(b); }); };
    draw();
    const tgF = el('div','field'); tgF.innerHTML=`<label>Tag <span class="hint">optional</span></label><input class="input" id="qtTag" list="qtTagList" placeholder="e.g. Lake District weekend" autocomplete="off">${tagDatalist('qtTagList')}`;
    s.appendChild(tgF);
    tgF.querySelector('#qtTag').oninput = e=>{ fs.tag=e.target.value; };
    const dF = el('div','field'); dF.innerHTML=`<label>Date</label><input class="input" id="qtDate" type="date" value="${todayISO()}" max="${todayISO()}">`;
    s.appendChild(dF);
    const info = el('div','split-summary good');
    info.innerHTML = `<span>Split equally · ${names.length} people</span><span class="v num">${money(r.cost)}</span>`;
    s.appendChild(info);
    s.appendChild(aaNote());
    const btn = el('button','btn btn-primary btn-block','Log '+money(r.cost)); btn.style.marginTop='14px';
    btn.onclick = async ()=>{
      const cents=Math.round(r.cost*100), n=names.length||1, base=Math.floor(cents/n); let rem=cents-base*n;
      const split={}; names.forEach((nm,i)=>split[nm]=(base+(i<rem?1:0))/100);
      const payload={ name:`Trip: ${q.origin} → ${q.destination}`, total:r.cost, paidBy:fs.paidBy, split, type:'trip', tag:(fs.tag||'').trim(),
        description:`${r.miles} miles${r.roundTrip?' return':''} · ${r.litres} L · ${q.mpg} mpg @ ${fuelGBP()}/L`,
        ts: tsFromISO(s.querySelector('#qtDate').value) };
      btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
      try{ applyData(await api('addExpense',payload)); closeSheet(); toast('Trip logged'); state.tab='balances'; renderAll(); }
      catch(e){ toast(e.message,'err'); btn.disabled=false; btn.innerHTML='Log '+money(r.cost); }
    };
    s.appendChild(btn);
  });
}
function quickTripEditorSheet(){
  openSheet(s=>{
    s.appendChild(el('h2',null,'New quick trip'));
    s.appendChild(el('p','desc','A journey you make often — saved so you can log it in one tap.'));
    s.innerHTML += `
      <div style="display:flex;gap:12px">
        <div class="field" style="flex:none;width:80px"><label>Emoji</label><input class="input" id="qtEmoji" maxlength="2" placeholder="🚗" style="text-align:center;font-size:22px"></div>
        <div class="field" style="flex:1"><label>Label</label><input class="input" id="qtLabel" placeholder="e.g. Footy training"></div>
      </div>
      <div class="field"><label>Start</label><input class="input" id="qtFrom" list="qtPlaceList" autocomplete="off" placeholder="Type or pick a saved place"></div>
      <div class="field"><label>Destination</label><input class="input" id="qtTo" list="qtPlaceList" autocomplete="off" placeholder="Type or pick a saved place"></div>
      ${placeDatalist('qtPlaceList')}
      <div class="field"><label>Vehicle</label><select class="input" id="qtVeh"></select></div>
      <div class="field"><label>MPG</label><input class="input" id="qtMpg" type="number" inputmode="decimal" placeholder="e.g. 45"></div>
      <div class="field"><label style="display:flex;align-items:center;gap:9px;cursor:pointer">
        <input type="checkbox" id="qtRound" style="width:18px;height:18px;accent-color:var(--brand)"> Return journey</label></div>
      <div class="field"><label>Split between</label><div class="people-grid" id="qtSplit"></div></div>`;
    const veh = s.querySelector('#qtVeh');
    veh.innerHTML = `<option value="">— Manual MPG —</option>` + state.vehicles.map(v=>`<option value="${esc(v.name)}">${esc(v.name)} · ${v.mpg} mpg</option>`).join('');
    veh.onchange = ()=>{ const v=state.vehicles.find(x=>x.name===veh.value); if(v) s.querySelector('#qtMpg').value=v.mpg; };
    const sel = new Set(state.people.map(p=>p.name));
    const drawS=()=>{ const g=s.querySelector('#qtSplit'); g.innerHTML='';
      const all=el('button','pchip'+(sel.size===state.people.length?' on':'')); all.innerHTML='Everyone<span class="tick">✓</span>';
      all.onclick=()=>{ if(sel.size===state.people.length)sel.clear(); else state.people.forEach(p=>sel.add(p.name)); drawS(); };
      g.appendChild(all);
      state.people.forEach(p=>{ const b=el('button','pchip'+(sel.has(p.name)?' on':''));
        b.innerHTML=`${avatar(p.name,'sm')}${esc(p.name)}<span class="tick">✓</span>`;
        b.onclick=()=>{ sel.has(p.name)?sel.delete(p.name):sel.add(p.name); drawS(); }; g.appendChild(b); }); };
    drawS();
    const btn = el('button','btn btn-primary btn-block','Create quick trip');
    btn.onclick = async ()=>{
      const label=s.querySelector('#qtLabel').value.trim();
      const origin=s.querySelector('#qtFrom').value.trim();
      const destination=s.querySelector('#qtTo').value.trim();
      const mpg=Number(s.querySelector('#qtMpg').value)||0;
      if(!label) return toast('Give it a label','err');
      if(!origin||!destination) return toast('Enter both places','err');
      if(!(mpg>0)) return toast('Enter the MPG','err');
      const split = sel.size===state.people.length ? 'all' : [...sel];
      const q = { label, emoji:s.querySelector('#qtEmoji').value.trim()||'🚗', origin, destination,
        vehicle:s.querySelector('#qtVeh').value||'', mpg, roundTrip:s.querySelector('#qtRound').checked, split };
      btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
      try{
        if(SCRIPT_URL){ applyData(await api('addQuickTrip',q)); }
        else { state.quickTrips.push(q); }
        closeSheet(); toast('Quick trip created'); renderAll();
      }catch(e){ toast(e.message,'err'); btn.disabled=false; btn.innerHTML='Create quick trip'; }
    };
    s.appendChild(btn);
  });
}
function aaNote(){
  const n = el('div','note');
  n.innerHTML = `<span class="ni">⛽</span><span>The cost of unleaded is set to the AA UK average (currently ${fuelGBP()}/litre) and is reviewed every 4 weeks. Change it under Settings.</span>`;
  return n;
}
function logQuick(q){
  openSheet(s=>{
    s.appendChild(el('h2',null,`${q.emoji||'⚡'} ${esc(q.label)}`));
    s.appendChild(el('p','desc','Log this now? You can change who paid first.'));
    const names = (q.split==='all'||!Array.isArray(q.split)) ? state.people.map(p=>p.name) : q.split.filter(n=>state.people.some(p=>p.name===n));
    const fs = { paidBy: state.me };
    const f = el('div','field'); f.innerHTML='<label>Paid by</label><div class="people-grid" id="qPaid"></div>';
    s.appendChild(f);
    const draw = ()=>{ const g=f.querySelector('#qPaid'); g.innerHTML='';
      state.people.forEach(p=>{ const b=el('button','pchip'+(fs.paidBy===p.name?' on':''));
        b.innerHTML=`${avatar(p.name,'sm')}${esc(p.name)}<span class="tick">✓</span>`;
        b.onclick=()=>{fs.paidBy=p.name; draw();}; g.appendChild(b); }); };
    draw();
    const dF = el('div','field'); dF.innerHTML = `<label>Date</label><input class="input" id="qDate" type="date" value="${todayISO()}" max="${todayISO()}">`;
    s.appendChild(dF);
    const info = el('div','split-summary good');
    info.innerHTML = `<span>Split equally · ${names.length} people</span><span class="v num">${money(q.amount)}</span>`;
    s.appendChild(info);
    const btn = el('button','btn btn-primary btn-block','Log '+money(q.amount)); btn.style.marginTop='14px';
    btn.onclick = async ()=>{
      const cents=Math.round(q.amount*100), n=names.length||1, base=Math.floor(cents/n); let rem=cents-base*n;
      const split={}; names.forEach((nm,i)=>split[nm]=(base+(i<rem?1:0))/100);
      const payload={ name:q.label, total:q.amount, description:q.description||'', paidBy:fs.paidBy, split, type:'quick', ts: tsFromISO(s.querySelector('#qDate').value) };
      btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
      try{
        if(SCRIPT_URL){ applyData(await api('addExpense',payload)); }
        else { state.expenses.unshift({id:'local_'+Date.now(),receiptUrl:'',...payload}); state.expenses.sort((a,b)=>b.ts-a.ts); }
        closeSheet(); toast(q.label+' logged'); state.tab='balances'; renderAll();
      }catch(e){ toast(e.message,'err'); btn.disabled=false; btn.innerHTML='Log '+money(q.amount); }
    };
    s.appendChild(btn);
  });
}
async function deleteQuick(q){
  if(SCRIPT_URL){ try{ applyData(await api('deleteQuickExpense',{label:q.label})); toast('Removed'); }catch(e){ toast(e.message,'err'); } }
  else { state.quick = state.quick.filter(x=>x!==q); }
  renderAll();
}
function quickEditorSheet(){
  openSheet(s=>{
    s.appendChild(el('h2',null,'New quick expense'));
    s.appendChild(el('p','desc','A reusable button — like a coffee round or a weekly subscription.'));
    s.innerHTML += `
      <div class="field"><label>Emoji</label><input class="input" id="qEmoji" maxlength="2" placeholder="☕" style="width:80px;text-align:center;font-size:22px"></div>
      <div class="field"><label>Label</label><input class="input" id="qLabel" placeholder="e.g. Coffee round"></div>

// Work out each person's share: each leg's cost is split only among
// the people in the car for it (driver drives the whole way).
function computeTripShares(r, sp){
  const parts = [...sp.parts];
  const legCount = r.legs.length;
  const raw = {}; parts.forEach(p=>raw[p]=0);
  let ok = true;
  for(let i=0;i<legCount;i++){
    const present = parts.filter(p=> (sp.exit[p]||legCount) >= i+1);
    if(!present.length){ ok=false; continue; }
    const c = r.legs[i].costExact!=null ? r.legs[i].costExact : r.legs[i].cost;
    present.forEach(p=> raw[p]+= c/present.length);
  }
  const target = Math.round(r.cost*100);
  const cents = {}; let sum=0;
  parts.forEach(p=>{ cents[p]=Math.floor(raw[p]*100); sum+=cents[p]; });
  const sorted = parts.slice().sort((a,b)=> (raw[b]*100-Math.floor(raw[b]*100)) - (raw[a]*100-Math.floor(raw[a]*100)));
  let rem = target - sum, k=0;
  while(rem>0 && sorted.length){ cents[sorted[k%sorted.length]]+=1; rem--; k++; }
  while(rem<0 && sorted.length){ const p=sorted[sorted.length-1-(k%sorted.length)]; if(cents[p]>0){cents[p]-=1; rem++;} k++; }
  const shares={}; parts.forEach(p=> shares[p]=cents[p]/100);
  return {shares, ok, total:r.cost};
}

async function logTrip(r, sp, btn){
  const sh = computeTripShares(r, sp);
  if(!sh.ok) return toast('Every leg needs at least one person in the car','err');
  const split={}; Object.keys(sh.shares).forEach(p=>{ if(sh.shares[p]>0) split[p]=sh.shares[p]; });
  if(!Object.keys(split).length) return toast('Nobody is set to pay for this trip','err');
  const labels = (trip.display && trip.display.length===r.stops.length) ? trip.display : r.stops;
  const exits = [...sp.parts].filter(p=>p!==sp.driver && sp.exit[p] < r.stops.length-1)
    .map(p=>`${p} out at ${labels[sp.exit[p]]}`).join(', ');
  const payload = {
    name:`Trip: ${labels[0]} → ${labels[labels.length-1]}`,
    total:r.cost, paidBy:sp.driver, split, type:'trip', tag:(sp.tag||'').trim(),
    description:`${labels.join(' → ')} · ${r.miles} mi · ${r.litres} L · ${trip.mpg} mpg @ ${fuelGBP()}/L${exits?(' · '+exits):''}`,
    ts: tsFromISO(sp.date)
  };
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try{
    if(SCRIPT_URL){ applyData(await api('addExpense',payload)); }
    else { state.expenses.unshift({id:'local_'+Date.now(),receiptUrl:'',...payload}); state.expenses.sort((a,b)=>b.ts-a.ts); }
    trip.result=null; toast('Trip logged'); state.tab='balances'; renderAll();
  }catch(e){ toast(e.message,'err'); btn.disabled=false; btn.innerHTML='Log trip · '+money(r.cost); }
}

function drawMap(r){
  const node = document.getElementById('map'); if(!node||typeof L==='undefined') return;
  if(_map){ _map.remove(); _map=null; }
  _map = L.map(node,{zoomControl:false, attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(_map);
  const pts = r.polyline ? decodePolyline(r.polyline) : (r.points||[]);
  let line;
  if(pts.length){ line = L.polyline(pts,{color:'#0E7C66',weight:4,opacity:.9}).addTo(_map); }
  (r.points||[]).forEach((pt,i)=>{
    const last = i===r.points.length-1;
    L.circleMarker(pt,{radius:7,color:last?'#E5564B':'#0E7C66',fillColor:last?'#E5564B':'#0E7C66',fillOpacity:1,weight:2}).addTo(_map);
  });
  if(line) _map.fitBounds(line.getBounds().pad(0.15));
  else if(r.points&&r.points.length) _map.fitBounds(L.latLngBounds(r.points).pad(0.2));
  setTimeout(()=>_map.invalidateSize(),100);
}
function decodePolyline(str){
  let index=0,lat=0,lng=0,coords=[];
  while(index<str.length){
    let b,shift=0,result=0;
    do{ b=str.charCodeAt(index++)-63; result|=(b&0x1f)<<shift; shift+=5; }while(b>=0x20);
    lat += (result&1)?~(result>>1):(result>>1); shift=0; result=0;
    do{ b=str.charCodeAt(index++)-63; result|=(b&0x1f)<<shift; shift+=5; }while(b>=0x20);
    lng += (result&1)?~(result>>1):(result>>1);
    coords.push([lat/1e5,lng/1e5]);
  }
  return coords;
}

    const mk = (label,val)=>{ const c=el('button','fchip'+((state.tagFilter===val)?' on':'')); c.textContent=label; c.onclick=()=>{ state.tagFilter=val; renderAll(); }; return c; };
    scroller.appendChild(mk('All', null));
    tags.forEach(t=> scroller.appendChild(mk('# '+t, t)));
    wrap.appendChild(scroller);
  }

  const shown = state.tagFilter ? state.expenses.filter(x=>x.tag===state.tagFilter) : state.expenses;

  if(state.tagFilter){
    const total = shown.reduce((s,x)=> s + (x.type==='transfer'?0:x.total), 0);
    const mine = shown.reduce((s,x)=> s + ((x.type!=='transfer' && x.split && x.split[state.me])||0), 0);
    const sum = el('div','overall pos'); sum.style.marginBottom='14px';
    sum.innerHTML = `<div class="lbl"># ${esc(state.tagFilter)}</div><div class="big num">${money(total)}</div><div class="sub">${shown.length} item${shown.length===1?'':'s'} · your share ${money(mine)}</div>`;
    wrap.appendChild(sum);
  }

  const list = el('div','card');
  if(!shown.length){
    list.appendChild(emptyState('🧾', state.tagFilter?'Nothing tagged here':'Nothing logged yet', state.tagFilter?'No items carry this tag yet.':'Add your first expense from the Add tab.'));
  } else {
    shown.forEach(x=>{
      const youPaid = x.paidBy===state.me;
      const row = el('div','act-row');
      const ds = fmtDate(x.ts);
      const tagPill = (x.tag && !state.tagFilter) ? ` <span class="tag-pill">#${esc(x.tag)}</span>` : '';
      let meta, right;
      if(x.type==='transfer'){
        const to = Object.keys(x.split||{})[0]||'';
        const label = youPaid ? `You paid ${esc(to)}` : (to===state.me ? `${esc(x.paidBy)} paid you` : `${esc(x.paidBy)} paid ${esc(to)}`);
        meta = `${label} · ${ds}`;
        right = `<div class="tot num">${money(x.total)}</div><div class="yr">payment</div>`;
      } else {
        const yourShare = (x.split&&x.split[state.me])||0;
        meta = `${youPaid?'You':esc(x.paidBy)} paid · ${ds}${x.receiptUrl?' · 📎':''}`;
        right = `<div class="tot num">${money(x.total)}</div><div class="yr">${yourShare?('your share '+money(yourShare)):'not in split'}</div>`;
      }
      row.innerHTML = `<div class="act-ic">${typeIcon(x)}</div>
        <div class="act-main"><div class="at">${esc(x.name)}${tagPill}</div>
          <div class="am">${meta}</div></div>
        <div class="act-right">${right}</div>`;
      row.onclick = ()=>expenseDetailSheet(x);
      list.appendChild(row);
    });
  }
  wrap.appendChild(list);
  return wrap;
}
function expenseDetailSheet(x){
  openSheet(s=>{
    const isT = x.type==='transfer';
    const date = new Date(x.ts).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long'});
    if(isT){
      const to = Object.keys(x.split||{})[0]||'';
      s.appendChild(el('h2',null,'Payment'));
      s.appendChild(el('p','desc',date));
      const box = el('div','card'); box.style.cssText='padding:16px;margin-bottom:4px;display:flex;align-items:center;gap:12px;justify-content:center';
      box.innerHTML = `${avatar(x.paidBy,'md')}<div style="font-weight:600">${esc(x.paidBy)}</div>
        <div style="color:var(--brand);font-size:20px">→</div>
        <div style="font-weight:600">${esc(to)}</div>${avatar(to,'md')}`;
      s.appendChild(box);
      const amt = el('div'); amt.style.cssText='text-align:center;margin:14px 0';
      amt.innerHTML = `<div class="num" style="font-size:32px;font-weight:700">${money(x.total)}</div>`;
      s.appendChild(amt);
      if(x.description){ const d=el('div','card'); d.style.cssText='padding:13px 15px;margin-bottom:8px;font-size:14px;color:var(--ink-soft)'; d.textContent=x.description; s.appendChild(d); }
    } else {
      s.appendChild(el('h2',null,esc(x.name)));
      s.appendChild(el('p','desc',`${esc(x.paidBy)} paid ${money(x.total)} · ${date}`));
      if(x.description){ const d=el('div','card'); d.style.cssText='padding:13px 15px;margin-bottom:14px;font-size:14px;color:var(--ink-soft)'; d.textContent=x.description; s.appendChild(d); }
      s.appendChild(el('div','section-eyebrow','Split'));
      const box = el('div','card'); box.style.padding='4px 14px';
      Object.keys(x.split||{}).forEach(nm=>{
        const r=el('div','split-row');
        r.innerHTML=`${avatar(nm,'sm')}<span class="name">${esc(nm)}${nm===x.paidBy?' <span style="color:var(--faint);font-weight:400">· paid</span>':''}</span><span class="num" style="font-weight:600">${money(x.split[nm])}</span>`;
        box.appendChild(r);
      });
      s.appendChild(box);
    }
    if(x.receiptUrl){
      const a=el('a','btn btn-ghost btn-block','📎 View receipt'); a.href=x.receiptUrl; a.target='_blank'; a.style.marginTop='12px'; s.appendChild(a);
    }

    const tagF = el('div','field'); tagF.style.marginTop='14px';
    tagF.innerHTML = `<label>Tag <span class="hint">group with other items</span></label>
      <div style="display:flex;gap:8px"><input class="input" id="dTag" list="dTagList" autocomplete="off" placeholder="e.g. Lake District weekend" value="${esc(x.tag||'')}" style="flex:1">
      <button class="btn btn-primary btn-sm" id="dTagSave">Save</button></div>${tagDatalist('dTagList')}`;
    s.appendChild(tagF);
    tagF.querySelector('#dTagSave').onclick = async ()=>{
      const tag = tagF.querySelector('#dTag').value.trim();
      const b = tagF.querySelector('#dTagSave'); b.disabled=true; b.innerHTML='<span class="spin"></span>';
      try{
        if(SCRIPT_URL){ applyData(await api('setExpenseTag',{id:x.id, tag})); }
        else { const e=state.expenses.find(e=>e.id===x.id); if(e) e.tag=tag; }
        x.tag=tag; closeSheet(); toast(tag?'Tagged':'Tag removed'); renderAll();
      }catch(e){ toast(e.message,'err'); b.disabled=false; b.textContent='Save'; }
    };

    const del = el('button','btn btn-block', isT?'Delete payment':'Delete expense');
    del.style.cssText='margin-top:12px;color:var(--neg);background:var(--neg-soft)';
    del.onclick = async ()=>{
      del.disabled=true; del.innerHTML='<span class="spin"></span>';
      try{
        if(SCRIPT_URL){ applyData(await api('deleteExpense',{id:x.id})); }
        else { state.expenses=state.expenses.filter(e=>e.id!==x.id); }
        closeSheet(); toast('Deleted'); renderAll();
      }catch(e){ toast(e.message,'err'); del.disabled=false; del.innerHTML=isT?'Delete payment':'Delete expense'; }
    };
    s.appendChild(del);
  });
}

/* ---------------- File processing ---------------- */
function processFile(file){
  return new Promise((resolve,reject)=>{
    if(file.type.startsWith('image/')){
      const img=new Image(), reader=new FileReader();
      reader.onload=()=>{ img.onload=()=>{
        const max=1400; let {width:w,height:h}=img;
        if(w>max||h>max){ const sc=max/Math.max(w,h); w=Math.round(w*sc); h=Math.round(h*sc); }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl=c.toDataURL('image/jpeg',0.82);
        const b64=dataUrl.split(',')[1];
        resolve({data:b64, name:file.name.replace(/\.[^.]+$/,'')+'.jpg', mimeType:'image/jpeg', size:Math.round(b64.length*0.75), preview:dataUrl});
      }; img.onerror=reject; img.src=reader.result; };
      reader.onerror=reject; reader.readAsDataURL(file);
    } else {
      const reader=new FileReader();
      reader.onload=()=>{ const b64=reader.result.split(',')[1];
        resolve({data:b64, name:file.name, mimeType:file.type||'application/octet-stream', size:file.size, preview:null}); };
      reader.onerror=reject; reader.readAsDataURL(file);
    }
  });
}

/* ---------------- Misc ---------------- */
function emptyState(ic,t,sub){
  const e=el('div','empty');
  e.innerHTML=`<div class="e-ic">${ic}</div><div class="e-t">${esc(t)}</div><div class="e-s">${esc(sub)}</div>`;
  return e;
}

renderLogin();
if(SCRIPT_URL){ refresh(); }
